# Vspec Runtime Hardware Performance Manager
# Default profile: performent (high GPU throughput priority)

mode = performent
backend_preference = cuda
target_gpu_utilization = 0.98
max_vram_utilization = 0.96
dispatch_batch_hint = 12
stream_count_hint = 6
lowbit_target_bits = 3
enable_lowbit_boost = true

# Ultimate quality-oriented mode (Mixed-Precision + Outlier-aware + QLoRA-style adapter + Tensor Core preference)
enable_ultimate_mode = false
enable_outlier_aware = true
enable_qlora_adapter = true
prefer_tensor_core = true
outlier_threshold = 6.0
quality_bias = 0.80
qlora_rank = 16
